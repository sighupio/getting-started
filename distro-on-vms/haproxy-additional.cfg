frontend ingress-http
    mode tcp
    bind *:80
    default_backend ingress-http

backend ingress-http
    server worker1example.tld 192.168.1.184:30080 maxconn 256 check
    server worker2example.tld 192.168.1.185:30080 maxconn 256 check
    server worker3example.tld 192.168.1.186:30080 maxconn 256 check

frontend ingress-https
    mode tcp
    bind *:443
    default_backend ingress-https

backend ingress-https
    server worker1example.tld 192.168.1.184:30443 maxconn 256 check
    server worker2example.tld 192.168.1.185:30443 maxconn 256 check
    server worker3example.tld 192.168.1.186:30443 maxconn 256 check
